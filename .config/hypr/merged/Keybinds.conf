# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Default Keybinds
# visit https://wiki.hyprland.org/Configuring/Binds/ for more info

$files = nemo
$term = kitty
$browser = zen

# /* ---- ✴️ Variables ✴️ ---- */  #
$scriptsDir = $HOME/.config/hypr/scripts
$UserConfigs = $HOME/.config/hypr/UserConfigs
$UserScripts = $HOME/.config/hypr/UserScripts

#### SYSTEM ####
bindd = CTRL ALT, Delete, Exit Hyprland, exec, hyprctl dispatch exit 0
bindd = SUPER, X, Close active program, killactive,
bindd = SUPER, F, Toggle window fullscreen, fullscreen,
bindd = SUPER CTRL, F, Toggle window full width, fullscreen, 1
bindd = SUPER SHIFT, X, Kill active process, forcekillactive
bindd = CTRL ALT, P, Power menu, exec, $scriptsDir/Wlogout.sh
bindd = SUPER SHIFT, N, Notifications, exec, swaync-client -t -sw
bindd = SUPER SHIFT, E, Quick Settings, exec, $scriptsDir/Kool_Quick_Settings.sh

#### STANDAR ####
# Common shortcuts
#bindr = SUPER, SUPER_L, exec, pkill rofi || rofi -show drun -modi drun,filebrowser,run,window # Super Key to Launch rofi menu
bind = ALT, SPACE, exec, pkill rofi || rofi -show drun -modi drun,filebrowser,run,window
bindd = SUPER, D, app launcher, exec, pkill rofi || true && rofi -show drun -modi drun,filebrowser,run,window
#bindd = SUPER, A, Quickshell overview, global, quickshell:overviewToggle # desktop overview (if installed)
bindd = SUPER, E, file manager, exec, $files
bindd = SUPER, Return, open terminal, exec, $term
bindd = SUPER, B, open browser, exec, $browser

# FEATURES / EXTRAS
bindd = SUPER ALT, R, Refresh waybar swaync and rofi, exec, $scriptsDir/Refresh.sh
bindd = SUPER ALT, E, Emoji picker, exec, $scriptsDir/RofiEmoji.sh
bindd = SUPER SHIFT, B, Toggle Blur, exec, $scriptsDir/ChangeBlur.sh
bindd = SUPER ALT, L, Toggle Dwindle layout, exec, $scriptsDir/ChangeLayout.sh
bindd = SUPER, T, Global theme switcher using Wallust, exec, $scriptsDir/ThemeChanger.sh #Global theme switcher
bindd = SUPER CTRL, S, window switcher, exec, rofi -show window
bindd = SUPER CTRL SHIFT, R, rofi theme selector (modified), exec, pkill rofi || true && $scriptsDir/RofiThemeSelector-modified.sh

# FEATURES / EXTRAS (UserScripts)
bindd = SUPER SHIFT, M, Online Music Picker, exec, $UserScripts/RofiBeats.sh
bindd = SUPER, W, Wallpaper Picker, exec, $UserScripts/WallpaperSelect.sh
bindd = SUPER SHIFT, W, Wallpaper Effects Picker, exec, $UserScripts/WallpaperEffects.sh
bindd = CTRL ALT, W, Wallpaper Randomizer, exec, $UserScripts/WallpaperRandom.sh
bindd = SUPER CTRL, O, toggle active window opacity, setprop, active opaque toggle
bindd = SUPER CTRL, K, Search Keybinds, exec, $UserScripts/binds-search.py
#bindlnd = SHIFT_L, ALT_L, switch keyboard layout per-window, exec, $scriptsDir/Tak0-Per-Window-Switch.sh
bindd = SUPER ALT, C, calculator, exec, $UserScripts/RofiCalc.sh
bindd = SUPER ALT, SPACE, Float all windows, exec, hyprctl dispatch workspaceopt allfloat
bindd = SUPER SHIFT, Return, DropDown terminal, exec, $scriptsDir/Dropterminal.sh $term

# Desktop zooming or magnifier
bindd = SUPER ALT, mouse_down, zoom in, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')"
bindd = SUPER ALT, mouse_up, zoom out, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')"

# Waybar / Bar related
bindd = SUPER CTRL, B, Pick Waybar Style, exec, $scriptsDir/WaybarStyles.sh
bindd = SUPER ALT, B, Pick Waybar Layout, exec, $scriptsDir/WaybarLayout.sh
bindd = SUPER CTRL ALT, B, toggle waybar on/off, exec, pkill -SIGUSR1 waybar

# Dwindle Layout
bindd = SUPER SHIFT, I, Toggle Split Direction, togglesplit
bindd = SUPER, P, Pseudo Tile Window, pseudo,

# Master Layout
bindd = SUPER CTRL, D, remove master, layoutmsg, removemaster
bindd = SUPER, I, add master, layoutmsg, addmaster
# NOTE: J/K bindings are set dynamically by scripts/KeybindsLayoutInit.sh and scripts/ChangeLayout.sh
# (we intentionally do not bind them statically here to avoid conflicts across layouts)
# bindd = SUPER, J, cycle next, layoutmsg, cyclenext
# bindd = SUPER, K, cycle previous, layoutmsg, cycleprev
bindd = SUPER CTRL, Return, swap with master, layoutmsg, swapwithmaster


# Works on either layout (Master or Dwindle)
bindd = SUPER, M, set split ratio 0.3, exec, hyprctl dispatch splitratio 0.3
# layout aware keybinds
exec-once = $scriptsDir/ChangeLayout.sh init

# group
bindd = SUPER, G, toggle group, togglegroup

# Navigate within a group
bindd = SUPER, Tab, Change Group Forward, changegroupactive, f
bindd = SUPER CTRL, tab, change active in group, changegroupactive
bindd = SUPER SHIFT, Tab, Change Group Back, changegroupactive, b

# Move window into/out of group
bindd = SUPER CTRL, K, Move left into group, moveintogroup, l # Move active window left into a group A
bindd = SUPER CTRL, L, Move Right into group, moveintogroup, r # Move active window right into a group
bindd = SUPER CTRL, H, Move active out of group, moveoutofgroup # Move active window out of group

 # Cycle windows if floating bring to top
bind = ALT, tab, cyclenext
bind = ALT, tab, bringactivetotop

# Special Keys / Hot Keys
bindel = , xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc # volume up
bindel = , xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec # volume down
bindl = , xf86AudioMicMute, exec, $scriptsDir/Volume.sh --toggle-mic # mic mute
bindl = , xf86audiomute, exec, $scriptsDir/Volume.sh --toggle # mute
bindl = , xf86Sleep, exec, systemctl suspend  # sleep button
bindeld = ALT, xf86audioraisevolume, volume up precise, exec, $scriptsDir/Volume.sh --inc-precise
bindeld = ALT, xf86audiolowervolume, volume down precise, exec, $scriptsDir/Volume.sh --dec-precise

# media controls using keyboards
bindl = , xf86AudioPlayPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioPlay, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioNext, exec, $scriptsDir/MediaCtrl.sh --nxt
bindl = , xf86AudioPrev, exec, $scriptsDir/MediaCtrl.sh --prv
bindl = , xf86audiostop, exec, $scriptsDir/MediaCtrl.sh --stop

# Screenshot keybindings NOTE: You may need to press Fn key as well
bindd = SUPER, Print, Screenshot everything, exec, $scriptsDir/ScreenShot.sh --now
bindd = SUPER SHIFT, Print, Screenshot area, exec, $scriptsDir/ScreenShot.sh --area
bindd = SUPER CTRL, Print, Screenshot everything in 5 sec, exec, $scriptsDir/ScreenShot.sh --in5
bindd = SUPER CTRL SHIFT, Print, Screenshot everything in 10 sec, exec, $scriptsDir/ScreenShot.sh --in10
bindd = ALT, Print, Screenshot active window, exec, $scriptsDir/ScreenShot.sh --active

# screenshot with swappy (another screenshot tool)
bindd = SUPER SHIFT, S, Screenshot area (swappy), exec, $scriptsDir/ScreenShot.sh --swappy

# Resize windows
binded = SUPER SHIFT, left, Resize Window Left, resizeactive,-50 0
binded = SUPER SHIFT, right, Resize Window Right, resizeactive,50 0
binded = SUPER SHIFT, up, Resize Window Up, resizeactive,0 -50
binded = SUPER SHIFT, down, Resize Window Down, resizeactive,0 50

# Move windows
bind = SUPER CTRL, left, movewindow, l
bind = SUPER CTRL, right, movewindow, r
bind = SUPER CTRL, up, movewindow, u
bind = SUPER CTRL, down, movewindow, d

# Swap windows
bind = SUPER ALT, left, swapwindow, l
bind = SUPER ALT, right, swapwindow, r
bind = SUPER ALT, up, swapwindow, u
bind = SUPER ALT, down, swapwindow, d

# Move focus with mainMod + arrow keys
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r
bind = SUPER SHIFT, SPACE, togglefloating

# Workspaces related
# bindd = SUPER, tab, Next Workspace, workspace, m+1
# bindd = SUPER SHIFT, tab, Previous Workspace,  workspace, m-1

# Special workspace
bindd = SUPER SHIFT, U, Send to Special Workspace, movetoworkspace, special
bindd = SUPER, U, Toggle Special Workspace, togglespecialworkspace,

# The following mappings use the key codes to better support various keyboard layouts
# 1 is code:10, 2 is code 11, etc
# Switch workspaces with mainMod + [0-9] 
bind = SUPER, code:10, workspace, 1 # NOTE: code:10 = key 1
bind = SUPER, code:11, workspace, 2 # NOTE: code:11 = key 2
bind = SUPER, code:12, workspace, 3 # NOTE: code:12 = key 3
bind = SUPER, code:13, workspace, 4 # NOTE: code:13 = key 4
bind = SUPER, code:14, workspace, 5 # NOTE: code:14 = key 5
bind = SUPER, code:15, workspace, 6 # NOTE: code:15 = key 6
bind = SUPER, code:16, workspace, 7 # NOTE: code:16 = key 7
bind = SUPER, code:17, workspace, 8 # NOTE: code:17 = key 8
bind = SUPER, code:18, workspace, 9 # NOTE: code:18 = key 9
bind = SUPER, code:19, workspace, 10 # NOTE: code:19 = key 0

# Move active window and follow to workspace mainMod + SHIFT [0-9]
bind = SUPER SHIFT, code:10, movetoworkspace, 1 # NOTE: code:10 = key 1
bind = SUPER SHIFT, code:11, movetoworkspace, 2 # NOTE: code:11 = key 2
bind = SUPER SHIFT, code:12, movetoworkspace, 3 # NOTE: code:12 = key 3
bind = SUPER SHIFT, code:13, movetoworkspace, 4 # NOTE: code:13 = key 4
bind = SUPER SHIFT, code:14, movetoworkspace, 5 # NOTE: code:14 = key 5
bind = SUPER SHIFT, code:15, movetoworkspace, 6 # NOTE: code:15 = key 6
bind = SUPER SHIFT, code:16, movetoworkspace, 7 # NOTE: code:16 = key 7
bind = SUPER SHIFT, code:17, movetoworkspace, 8 # NOTE: code:17 = key 8
bind = SUPER SHIFT, code:18, movetoworkspace, 9 # NOTE: code:18 = key 9
bind = SUPER SHIFT, code:19, movetoworkspace, 10 # NOTE: code:19 = key 0
bind = SUPER SHIFT, bracketleft, movetoworkspace, -1 # brackets [
bind = SUPER SHIFT, bracketright, movetoworkspace, +1 # brackets ]

# Move active window to a workspace silently mainMod + CTRL [0-9]
bind = SUPER CTRL, code:10, movetoworkspacesilent, 1 # NOTE: code:10 = key 1
bind = SUPER CTRL, code:11, movetoworkspacesilent, 2 # NOTE: code:11 = key 2
bind = SUPER CTRL, code:12, movetoworkspacesilent, 3 # NOTE: code:12 = key 3
bind = SUPER CTRL, code:13, movetoworkspacesilent, 4 # NOTE: code:13 = key 4
bind = SUPER CTRL, code:14, movetoworkspacesilent, 5 # NOTE: code:14 = key 5
bind = SUPER CTRL, code:15, movetoworkspacesilent, 6 # NOTE: code:15 = key 6
bind = SUPER CTRL, code:16, movetoworkspacesilent, 7 # NOTE: code:16 = key 7
bind = SUPER CTRL, code:17, movetoworkspacesilent, 8 # NOTE: code:17 = key 8
bind = SUPER CTRL, code:18, movetoworkspacesilent, 9 # NOTE: code:18 = key 9
bind = SUPER CTRL, code:19, movetoworkspacesilent, 10 # NOTE: code:19 = key 0
bind = SUPER CTRL, bracketleft, movetoworkspacesilent, -1 # brackets [
bind = SUPER CTRL, bracketright, movetoworkspacesilent, +1 # brackets ]

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1
bindd = SUPER, period, Next Active Workspace, workspace, e+1
bindd = SUPER, comma, Previous Active Workspace, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow # NOTE: mouse:272 = left click
bindm = SUPER, mouse:273, resizewindow # NOTE: mouse:272 = right click
